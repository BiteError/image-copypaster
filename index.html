<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image CopyPaster</title>
</head>

<body>

  <div id="toolbar">
    <button class="primary" id="reset-btn">Clear canvas</button>
    <button id="flip-horizontally-btn">Flip Horizontally</button>
    <button id="flip-vertically-btn">Flip Vertically</button>
    <button id="rotate-btn">Rotate</button>


    <div class="toggle-group">
      <input type="checkbox" id="transparency-toggle">
      <label for="transparency-toggle">Enable Alpha Paste</label>
      <div class="alpha-color" id="alpha-color" style="background: transparent;"></div>
      <div class="hint" id="hotkey-hint">
        <span><kbd>⌥/Alt</kbd>+<kbd>Click</kbd>&nbsp;on image (disable with <kbd>Shift</kbd>)</span>
      </div>
    </div>

    <div class="hint" id="hotkey-hint">
      <span><kbd>⌘/Ctrl</kbd>+<kbd>C</kbd>: Copy</span>
      <span><kbd>⌘/Ctrl</kbd>+<kbd>V</kbd>: Paste</span>
      <span><kbd>⌘/Ctrl</kbd>+<kbd>A</kbd>: All</span>
      <span><kbd>H</kbd>/<kbd>V</kbd>: Flip</span>
      <span><kbd>R</kbd>: Rotate</span>
      <span><kbd>⌘/Ctrl</kbd>+<kbd>Z</kbd>: Undo</span>
      <span><kbd>⌘/Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>Z</kbd>: Redo</span>
    </div>
  </div>

  <div id="container">
    <canvas id="image-canvas"></canvas>
    <canvas id="ui-layer"></canvas>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
