<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image CopyPaster</title>
  <style>
    html, body { background: #1a1a1a; }
    #toolbar { visibility: hidden; }
  </style>
</head>

<body>

  <div id="toolbar">
    <button class="primary" id="reset-btn">Clear canvas</button>
    <button id="flip-horizontally-btn" data-hint="(H)">Flip Horizontally</button>
    <button id="flip-vertically-btn" data-hint="(V)">Flip Vertically</button>
    <button id="rotate-btn" data-hint="(R)">Rotate</button>
    <div class="toggle-group">
      <button id="shape-toggle-btn" data-hint="(Space)">Shape: ▭</button>
      <label for="shape-slider">Roundness</label>
      <input type="range" id="shape-slider" min="1" max="8" step="0.1" value="2">
    </div>


    <div class="toggle-group">
      <span class="hint-wrap" data-hint="(Alt + Click)">
        <input type="checkbox" id="transparency-toggle">
      </span>
      <label for="transparency-toggle">Enable Alpha Paste</label>
      <div class="alpha-color" id="alpha-color" style="background: transparent;"></div>
      <label for="tolerance-slider">Tolerance</label>
      <input type="range" id="tolerance-slider" min="0" max="100" value="10">
    </div>

    <button id="help-btn" aria-label="Keyboard shortcuts">?</button>
    <div class="help-panel hidden" id="help-panel" role="dialog" aria-label="Keyboard shortcuts">
      <ul>
        <li><kbd>⌘/Ctrl</kbd>+<kbd>C</kbd> Copy</li>
        <li><kbd>⌘/Ctrl</kbd>+<kbd>V</kbd> Paste</li>
        <li><kbd>⌘/Ctrl</kbd>+<kbd>A</kbd> Select all</li>
        <li><kbd>H</kbd>/<kbd>V</kbd> Flip</li>
        <li><kbd>R</kbd> Rotate</li>
        <li><kbd>Space</kbd> Toggle shape</li>
        <li><kbd>⌘/Ctrl</kbd>+<kbd>Z</kbd> Undo</li>
        <li><kbd>⌘/Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>Z</kbd> Redo</li>
        <li><kbd>⌥/Alt</kbd>+<kbd>Click</kbd> on image to choose and</li>
        <li>enable alpha-color (disable with <kbd>Shift</kbd>)</li>
      </ul>
    </div>
  </div>

  <div id="container">
    <canvas id="image-canvas"></canvas>
    <canvas id="ui-layer"></canvas>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
